<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oila Market</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#6C63FF;--primary-light:#8B83FF;--primary-dark:#5A52E0;--secondary:#FF6584;--accent:#00C9A7;--bg:#F5F7FB;--card:#FFF;--text:#1A1A2E;--text2:#6B7280;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 30px rgba(0,0,0,.12);--radius:16px;--radius-sm:10px;--tr:all .3s cubic-bezier(.4,0,.2,1)}
[data-theme="dark"]{--bg:#0F0F1A;--card:#1A1A2E;--text:#E5E7EB;--text2:#9CA3AF;--border:#2D2D44;--shadow:0 2px 12px rgba(0,0,0,.3);--shadow-lg:0 8px 30px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:var(--tr);overflow-x:hidden;max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.page{display:none;padding:16px 16px 85px;animation:fadeIn .3s ease}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 0;position:sticky;top:0;background:var(--bg);z-index:100}
.header h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-actions{display:flex;gap:10px;align-items:center}
.hdr-btn{width:40px;height:40px;border-radius:50%;background:var(--card);border:none;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text);cursor:pointer;box-shadow:var(--shadow);position:relative;transition:var(--tr)}.hdr-btn:active{transform:scale(.92)}
.badge{position:absolute;top:-2px;right:-2px;background:var(--secondary);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}.badge:empty{display:none}
.search-bar{display:flex;align-items:center;background:var(--card);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow);margin-bottom:16px;gap:10px}
.search-bar input{flex:1;border:none;outline:none;background:transparent;font-size:15px;color:var(--text);font-family:inherit}
.search-bar i{color:var(--text2)}
.banner-slider{position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:20px;height:170px;box-shadow:var(--shadow-lg);touch-action:pan-y}
.banner-slide{position:absolute;width:100%;height:100%;opacity:0;transition:opacity .8s;background-size:cover;background-position:center;display:flex;align-items:flex-end;cursor:pointer}
.banner-slide.active{opacity:1}
.banner-slide::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,rgba(0,0,0,.7))}
.banner-content{position:relative;z-index:2;padding:18px;color:#fff;width:100%}
.banner-content h3{font-size:17px;font-weight:700;margin-bottom:3px}
.banner-content p{font-size:12px;opacity:.9}
.banner-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:3}
.banner-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:var(--tr)}.banner-dot.active{background:#fff;width:20px;border-radius:4px}
.cat-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:18px;scrollbar-width:none}.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:72px;max-width:90px;padding:10px 8px;background:var(--card);border-radius:var(--radius-sm);cursor:pointer;transition:var(--tr);box-shadow:var(--shadow);border:2px solid transparent;flex-shrink:0}
.cat-chip.active{border-color:var(--primary);background:linear-gradient(135deg,rgba(108,99,255,.1),rgba(255,101,132,.05))}
.cat-chip .icon{font-size:22px}.cat-chip span{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px;text-align:center}
.sec-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title h2{font-size:19px;font-weight:700}
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.product-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:var(--tr);position:relative}
.product-card:active{transform:scale(.97)}
.product-img{width:100%;height:155px;object-fit:cover;background:var(--border)}
.product-info{padding:10px}
.product-name{font-size:13px;font-weight:600;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-price{font-size:15px;font-weight:800;color:var(--primary)}
.product-old{font-size:11px;color:var(--text2);text-decoration:line-through;margin-left:5px}
.product-meta{display:flex;align-items:center;gap:4px;margin-top:3px;font-size:11px;color:var(--text2)}
.product-meta i{color:#FFC107}
.fav-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:var(--tr)}.fav-btn.active{color:var(--secondary)}
.add-cart{position:absolute;bottom:8px;right:8px;width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(108,99,255,.4);transition:var(--tr)}.add-cart:active{transform:scale(1.15)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);display:flex;justify-content:space-around;padding:8px 0 12px;box-shadow:0 -2px 20px rgba(0,0,0,.08);z-index:100;border-radius:20px 20px 0 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 10px;border-radius:10px;transition:var(--tr);color:var(--text2);position:relative;background:none;border:none;font-family:inherit}
.nav-item.active{color:var(--primary)}
.nav-item.active::after{content:'';position:absolute;bottom:0;width:18px;height:3px;background:var(--primary);border-radius:2px}
.nav-item i{font-size:19px}.nav-item span{font-size:10px;font-weight:600}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200}.modal-bg.active{display:block}
.modal{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;max-height:92vh;background:var(--card);border-radius:24px 24px 0 0;z-index:201;overflow-y:auto;animation:slideUp .4s cubic-bezier(.4,0,.2,1)}
.modal-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.1);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;color:var(--text)}
.modal-img{width:100%;height:260px;object-fit:cover}
.modal-body{padding:18px}
.modal-body h2{font-size:20px;font-weight:700;margin-bottom:6px}
.price-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.modal-price{font-size:22px;font-weight:800;color:var(--primary)}
.modal-old{font-size:14px;color:var(--text2);text-decoration:line-through}
.modal-desc{font-size:13px;line-height:1.6;color:var(--text2);margin-bottom:14px}
.modal-stats{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.modal-stat{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}.modal-stat i{color:var(--primary)}
.reviews-sec{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
.review-card{background:var(--bg);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.rev-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rev-user{font-weight:600;font-size:13px}.rev-stars{color:#FFC107;font-size:11px}
.rev-text{font-size:12px;color:var(--text2);line-height:1.5}
.rev-date{font-size:10px;color:var(--text2);margin-top:3px}
.star-rating{display:flex;gap:3px;margin:6px 0}
.star-rating i{font-size:22px;color:var(--border);cursor:pointer;transition:var(--tr)}.star-rating i.active{color:#FFC107}
.write-rev textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-family:inherit;font-size:13px;resize:none;height:70px;background:var(--bg);color:var(--text);outline:none}
.cart-item{display:flex;gap:10px;background:var(--card);border-radius:var(--radius);padding:10px;margin-bottom:10px;box-shadow:var(--shadow);align-items:center}
.cart-img{width:75px;height:75px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0;background:var(--border)}
.cart-info{flex:1}
.cart-name{font-size:13px;font-weight:600;margin-bottom:3px}
.cart-price{font-size:14px;font-weight:700;color:var(--primary)}
.qty-ctrl{display:flex;align-items:center;gap:8px;margin-top:5px}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--bg);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:var(--tr)}.qty-btn:active{background:var(--primary);color:#fff;border-color:var(--primary)}
.cart-rm{color:var(--secondary);background:none;border:none;font-size:16px;cursor:pointer;padding:6px}
.cart-summary{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-top:14px}
.sum-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
.sum-row.total{font-size:17px;font-weight:800;color:var(--primary);border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.btn-primary{width:100%;padding:13px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:var(--tr);font-family:inherit;margin-top:10px}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.empty-state{text-align:center;padding:50px 20px}
.empty-state i{font-size:56px;color:var(--border);margin-bottom:14px}
.empty-state h3{font-size:17px;margin-bottom:6px}
.empty-state p{color:var(--text2);font-size:13px}
.order-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.order-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-id{font-weight:700;font-size:13px}
.order-status{padding:3px 8px;border-radius:16px;font-size:10px;font-weight:700}
.st-pending{background:#FFF3CD;color:#856404}.st-confirmed{background:#D1ECF1;color:#0C5460}.st-shipping{background:#CCE5FF;color:#004085}.st-delivered{background:#D4EDDA;color:#155724}.st-cancelled{background:#F8D7DA;color:#721C24}
.order-items{font-size:12px;color:var(--text2);margin-bottom:6px}
.order-ftr{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2)}
.order-total{font-weight:700;font-size:14px;color:var(--primary)}
.profile-hdr{text-align:center;padding:28px 18px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:var(--radius);margin-bottom:18px}
.prof-avatar{width:80px;height:80px;border-radius:50%;border:3px solid #fff;object-fit:cover;margin-bottom:8px;background:var(--card)}
.prof-name{color:#fff;font-size:19px;font-weight:700}
.prof-sub{color:rgba(255,255,255,.8);font-size:12px;margin-top:3px}
.prof-menu{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:7px;cursor:pointer;transition:var(--tr);box-shadow:var(--shadow)}
.prof-menu:active{transform:translateX(3px)}
.prof-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.prof-text{flex:1}.prof-text h4{font-size:13px;font-weight:600}.prof-text p{font-size:11px;color:var(--text2)}
.prof-menu i.fa-chevron-right{color:var(--text2);font-size:11px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:5px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:var(--tr)}
.form-group input:focus,.form-group textarea:focus{border-color:var(--primary)}
.checkout-sec{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.checkout-sec h3{font-size:15px;font-weight:700;margin-bottom:10px}
.delivery-opts{display:flex;gap:10px;margin-bottom:12px}
.del-opt{flex:1;padding:12px;border:2px solid var(--border);border-radius:var(--radius-sm);text-align:center;cursor:pointer;transition:var(--tr);font-size:13px;font-weight:600}
.del-opt.active{border-color:var(--primary);background:rgba(108,99,255,.08)}
.del-opt i{display:block;font-size:20px;margin-bottom:4px;color:var(--primary)}
.promo-row{display:flex;gap:8px;margin-bottom:10px}
.promo-row input{flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);outline:none}
.promo-row button{padding:10px 16px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit}
.promo-msg{font-size:12px;margin-bottom:8px;font-weight:600}
.promo-msg.ok{color:var(--accent)}.promo-msg.err{color:var(--secondary)}
.notif-item{display:flex;gap:10px;padding:10px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:6px;box-shadow:var(--shadow);align-items:flex-start}
.notif-item.unread{border-left:3px solid var(--primary)}
.notif-icon{width:34px;height:34px;border-radius:50%;background:rgba(108,99,255,.1);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-text h4{font-size:12px;font-weight:600;margin-bottom:2px}.notif-text p{font-size:11px;color:var(--text2)}.notif-time{font-size:10px;color:var(--text2);margin-top:3px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:9999;transition:transform .4s cubic-bezier(.4,0,.2,1);max-width:90%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.chat-box{display:flex;flex-direction:column;height:calc(100vh - 200px);max-height:500px}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 0}
.chat-msg{margin-bottom:10px;max-width:80%}
.chat-msg.sent{margin-left:auto;text-align:right}
.chat-msg .bubble{display:inline-block;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.4}
.chat-msg.sent .bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.chat-msg.received .bubble{background:var(--bg);color:var(--text);border-bottom-left-radius:4px}
.chat-msg .time{font-size:10px;color:var(--text2);margin-top:3px}
.chat-input{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border)}
.chat-input input{flex:1;padding:10px;border:1px solid var(--border);border-radius:20px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);outline:none}
.chat-input button{width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.invite-card{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:var(--radius);padding:24px;text-align:center;color:#fff;margin-bottom:16px}
.invite-card h3{font-size:20px;font-weight:800;margin-bottom:8px}
.invite-card p{font-size:13px;opacity:.9;margin-bottom:16px}
.invite-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--tr)}
.invite-btn:active{transform:scale(.95)}
.fav-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.toggle-sw{width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:var(--tr)}.toggle-sw.active{background:var(--primary)}
.toggle-sw::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:var(--tr)}.toggle-sw.active::after{left:22px}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="header">
    <h1>🛒 Oila Market</h1>
    <div class="hdr-actions">
      <button class="hdr-btn" onclick="showPage('notifications')"><i class="fas fa-bell"></i><span class="badge" id="notif-badge"></span></button>
      <button class="hdr-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></button>
    </div>
  </div>
  <div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Mahsulot qidirish..." id="search-input" oninput="doSearch()"></div>
  <div class="banner-slider" id="banner-slider"></div>
  <div class="cat-scroll" id="cat-list"></div>
  <div class="sec-title"><h2>Mahsulotlar</h2></div>
  <div class="products-grid" id="prod-grid"></div>
</div>

<!-- CART -->
<div class="page" id="page-cart">
  <div class="header"><h1>🛍️ Savat</h1></div>
  <div id="cart-content"></div>
</div>

<!-- ORDERS -->
<div class="page" id="page-orders">
  <div class="header"><h1>📦 Buyurtmalar</h1></div>
  <div id="orders-content"></div>
</div>

<!-- FAVORITES -->
<div class="page" id="page-favorites">
  <div class="header"><h1>❤️ Sevimlilar</h1></div>
  <div class="fav-grid" id="fav-grid"></div>
</div>

<!-- PROFILE -->
<div class="page" id="page-profile">
  <div class="header"><h1>👤 Profil</h1></div>
  <div id="profile-content"></div>
</div>

<!-- NOTIFICATIONS -->
<div class="page" id="page-notifications">
  <div class="header"><button class="hdr-btn" onclick="showPage('home')"><i class="fas fa-arrow-left"></i></button><h1 style="margin-left:10px">Bildirishnomalar</h1></div>
  <div id="notif-content"></div>
</div>

<!-- CHECKOUT -->
<div class="page" id="page-checkout">
  <div class="header"><button class="hdr-btn" onclick="showPage('cart')"><i class="fas fa-arrow-left"></i></button><h1 style="margin-left:10px">Buyurtma berish</h1></div>
  <div id="checkout-content"></div>
</div>

<!-- EDIT PROFILE -->
<div class="page" id="page-edit-profile">
  <div class="header"><button class="hdr-btn" onclick="showPage('profile')"><i class="fas fa-arrow-left"></i></button><h1 style="margin-left:10px">Profilni tahrirlash</h1></div>
  <div id="edit-content" style="padding-top:8px"></div>
</div>

<!-- SUPPORT CHAT -->
<div class="page" id="page-support">
  <div class="header"><button class="hdr-btn" onclick="showPage('profile')"><i class="fas fa-arrow-left"></i></button><h1 style="margin-left:10px">💬 Qo'llab-quvvatlash</h1></div>
  <div id="support-content"></div>
</div>

<!-- INVITE FRIENDS -->
<div class="page" id="page-invite">
  <div class="header"><button class="hdr-btn" onclick="showPage('profile')"><i class="fas fa-arrow-left"></i></button><h1 style="margin-left:10px">👥 Do'stlarni taklif qilish</h1></div>
  <div id="invite-content"></div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-bg" id="prod-modal" onclick="closeModal()"></div>
<div class="modal" id="modal-body" style="display:none"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i><span>Bosh</span></button>
  <button class="nav-item" onclick="showPage('cart')"><i class="fas fa-shopping-cart"></i><span>Savat</span><span class="badge" id="cart-badge"></span></button>
  <button class="nav-item" onclick="showPage('orders')"><i class="fas fa-box"></i><span>Buyurtma</span></button>
  <button class="nav-item" onclick="showPage('favorites')"><i class="fas fa-heart"></i><span>Sevimli</span></button>
  <button class="nav-item" onclick="showPage('profile')"><i class="fas fa-user"></i><span>Profil</span></button>
</nav>

<script>
const API='https://script.google.com/macros/s/AKfycbwD1vucn3LvWd6dALhcH3VLY3BTIjZ0S3Njf0JSeMyU6eKJRbzkHupfGhbhKb56V61n/exec';
const BOT_USERNAME='QiziriqOilaMarketBot'; // Replace with your bot username
let U=JSON.parse(localStorage.getItem('oila_user'))||null;
let products=[],categories=[],cart=[],favs=[],bannerIdx=0,bannerTimer=null,bannersData=[],selRating=5,appliedPromo=null,promoDiscount=0;

// ===== TELEGRAM INTEGRATION =====
function initTelegram(){
  // Load existing cached user from localStorage first
  const cached = JSON.parse(localStorage.getItem('oila_user')) || null;
  try{
    if(window.Telegram&&Telegram.WebApp){
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      const u=Telegram.WebApp.initDataUnsafe?.user;
      if(u){
        if(cached && (cached.telegramId === String(u.id) || cached.id === 'U'+u.id)){
          // Same user returning - preserve saved data (phone, address, etc.)
          cached.name = u.first_name + (u.last_name ? ' '+u.last_name : '');
          cached.username = u.username || cached.username || '';
          cached.avatar = u.photo_url || cached.avatar || '';
          U = cached;
        } else {
          // New user or different account
          U={id:'U'+u.id,telegramId:String(u.id),username:u.username||'',name:u.first_name+(u.last_name?' '+u.last_name:''),phone:'',address:'',avatar:u.photo_url||'',role:'user',isActive:true};
        }
        localStorage.setItem('oila_user',JSON.stringify(U));
      }
    }
  }catch(e){}
  if(!U){
    if(cached){ U = cached; }
    else {
      U={id:'U'+Date.now(),telegramId:'g'+Date.now(),username:'',name:'Mehmon',phone:'',address:'',avatar:'',role:'user',isActive:true};
      localStorage.setItem('oila_user',JSON.stringify(U));
    }
  }
}

// ===== FAST API (POST for all - fixes image upload & chat) =====
async function api(action,params={}){
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...params})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){return{success:false,error:e.message}}
}

// ===== INIT =====
async function init(){
  initTelegram();
  const saved=localStorage.getItem('oila_theme');
  if(saved==='dark'){document.documentElement.setAttribute('data-theme','dark');const ti=document.getElementById('theme-icon');if(ti)ti.className='fas fa-sun';}
  await Promise.all([loadCats(),loadProds(),loadBanners(),loadCart(),checkNotifs()]);
  // Sync user with backend - get full record including saved phone/address
  const loginResult = await api('loginUser',{telegramId:U.telegramId,username:U.username,name:U.name,avatar:U.avatar});
  if(loginResult.success && loginResult.data){
    U = loginResult.data;
    localStorage.setItem('oila_user',JSON.stringify(U));
  }
}

function toggleTheme(){
  const d=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'':'dark');
  localStorage.setItem('oila_theme',d?'light':'dark');
  document.getElementById('theme-icon').className=d?'fas fa-moon':'fas fa-sun';
  // Update toggle switch directly without re-rendering
  document.querySelectorAll('.toggle-sw').forEach(s=>s.classList.toggle('active',!d));
  const profP=document.querySelector('.prof-text p');if(profP&&profP.closest('.prof-menu')?.querySelector('.toggle-sw'))profP.textContent=!d?'Yoqilgan':'O\'chirilgan';
}

function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  const pages=['home','cart','orders','favorites','profile'];
  document.querySelectorAll('.nav-item').forEach((n,i)=>{n.classList.toggle('active',pages[i]===p)});
  if(supTimer&&p!=='support'){clearInterval(supTimer);supTimer=null;}
  if(p==='cart'){loadCart().then(()=>renderCart())}
  if(p==='orders')loadOrders();
  if(p==='favorites')loadFavs();
  if(p==='profile')renderProfile();
  if(p==='notifications')loadNotifsPage();
  if(p==='checkout')renderCheckout();
  if(p==='edit-profile')renderEdit();
  if(p==='support')loadSupport();
  if(p==='invite')renderInvite();
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function fp(p){return Number(p||0).toLocaleString('uz-UZ')+" so'm"}
function img(src){return src||'https://via.placeholder.com/300x200/6C63FF/fff?text=Oila+Market'}

// ===== BANNERS =====
async function loadBanners(){
  const r=await api('getBanners');
  const el=document.getElementById('banner-slider');
  if(!r.success||!r.data||!r.data.length){
    el.innerHTML='<div class="banner-slide active" style="background:linear-gradient(135deg,#6C63FF,#FF6584)"><div class="banner-content"><h3>Oila Marketga xush kelibsiz!</h3><p>Eng yaxshi mahsulotlar eng arzon narxlarda</p></div></div>';return;
  }
  const bs=r.data;bannersData=bs;
  el.innerHTML=bs.map((b,i)=>`<div class="banner-slide${i===0?' active':''}" data-idx="${i}" onclick="clickBanner(${i})" style="background-image:url('${img(b.image)}')"><div class="banner-content"><h3>🛒 Oila Market</h3><p>Maxsus takliflar va chegirmalar</p></div></div>`).join('')+
    '<div class="banner-dots">'+bs.map((_,i)=>`<div class="banner-dot${i===0?' active':''}" onclick="goBanner(${i})"></div>`).join('')+'</div>';
  // Touch swipe
  let sx=0;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX},{passive:true});
  el.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40){if(dx>0)goBanner((bannerIdx-1+bs.length)%bs.length);else goBanner((bannerIdx+1)%bs.length)}},{passive:true});
  if(bs.length>1){bannerTimer=setInterval(()=>{bannerIdx=(bannerIdx+1)%bs.length;goBanner(bannerIdx)},4000)}
}
function clickBanner(i){
  if(!bannersData||!bannersData[i])return;
  const b=bannersData[i];
  if(b.productId){openProd(b.productId)}
  else if(b.link){window.open(b.link,'_blank')}
}
function goBanner(i){
  bannerIdx=i;
  document.querySelectorAll('.banner-slide').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.banner-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
}

// ===== CATEGORIES =====
async function loadCats(){
  const r=await api('getCategories');
  if(!r.success||!r.data)return;
  categories=r.data;
  const el=document.getElementById('cat-list');
  el.innerHTML='<div class="cat-chip active" onclick="filterCat(\'all\',this)"><span class="icon">🏪</span><span>Barchasi</span></div>'+
    r.data.map(c=>`<div class="cat-chip" onclick="filterCat('${c.name}',this)"><span class="icon">${c.icon||'📦'}</span><span>${c.name}</span></div>`).join('');
}
function filterCat(c,el){document.querySelectorAll('.cat-chip').forEach(x=>x.classList.remove('active'));el.classList.add('active');renderProds(c)}

// ===== PRODUCTS =====
async function loadProds(){
  const r=await api('getProducts',{activeOnly:'true'});
  if(!r.success||!r.data)return;
  products=r.data;renderProds('all');
}
function renderProds(cat){
  const g=document.getElementById('prod-grid');
  let ps=cat==='all'?products:products.filter(p=>p.category===cat);
  if(!ps.length){g.innerHTML='<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-box-open"></i><h3>Mahsulot topilmadi</h3></div>';return}
  g.innerHTML=ps.map(p=>`<div class="product-card" onclick="openProd('${p.id}')">
    <button class="fav-btn${isFav(p.id)?' active':''}" onclick="event.stopPropagation();togFav('${p.id}')"><i class="fas fa-heart"></i></button>
    <img class="product-img" src="${img(p.image)}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200/6C63FF/fff?text=Oila'">
    <div class="product-info"><div class="product-name">${p.name}</div>
    <div style="display:flex;align-items:center;gap:5px"><span class="product-price">${fp(p.price)}</span>${p.oldPrice?`<span class="product-old">${fp(p.oldPrice)}</span>`:''}</div>
    <div class="product-meta"><i class="fas fa-star"></i>${p.rating||0} · ${p.sold||0} sotilgan</div></div>
    <button class="add-cart" onclick="event.stopPropagation();addCart('${p.id}')"><i class="fas fa-plus"></i></button></div>`).join('');
}
function doSearch(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const g=document.getElementById('prod-grid');
  const ps=products.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q));
  if(!ps.length){g.innerHTML='<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-search"></i><h3>Hech narsa topilmadi</h3></div>';return}
  g.innerHTML=ps.map(p=>`<div class="product-card" onclick="openProd('${p.id}')">
    <button class="fav-btn${isFav(p.id)?' active':''}" onclick="event.stopPropagation();togFav('${p.id}')"><i class="fas fa-heart"></i></button>
    <img class="product-img" src="${img(p.image)}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200/6C63FF/fff?text=Oila'">
    <div class="product-info"><div class="product-name">${p.name}</div>
    <div style="display:flex;align-items:center;gap:5px"><span class="product-price">${fp(p.price)}</span>${p.oldPrice?`<span class="product-old">${fp(p.oldPrice)}</span>`:''}</div>
    <div class="product-meta"><i class="fas fa-star"></i>${p.rating||0}</div></div>
    <button class="add-cart" onclick="event.stopPropagation();addCart('${p.id}')"><i class="fas fa-plus"></i></button></div>`).join('');
}

// ===== PRODUCT DETAIL =====
async function openProd(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const[revR]=await Promise.all([api('getReviews',{productId:id,approvedOnly:'true'})]);
  const revs=revR.success?revR.data||[]:[];
  const mb=document.getElementById('modal-body');
  mb.style.display='block';document.getElementById('prod-modal').classList.add('active');
  mb.innerHTML=`<button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <img class="modal-img" src="${img(p.image)}" onerror="this.src='https://via.placeholder.com/400x260/6C63FF/fff?text=Oila+Market'">
    <div class="modal-body"><h2>${p.name}</h2>
    <div class="price-row"><span class="modal-price">${fp(p.price)}</span>${p.oldPrice?`<span class="modal-old">${fp(p.oldPrice)}</span>`:''}</div>
    <div class="modal-stats">
      <div class="modal-stat"><i class="fas fa-star"></i>${p.rating||0} baho</div>
      <div class="modal-stat"><i class="fas fa-shopping-bag"></i>${p.sold||0} sotilgan</div>
      <div class="modal-stat"><i class="fas fa-box"></i>${p.stock||0} ${p.unit||'dona'}</div>
    </div>
    <p class="modal-desc">${p.description||"Mahsulot haqida ma'lumot yo'q"}</p>
    <button class="btn-primary" onclick="addCart('${p.id}');closeModal()"><i class="fas fa-cart-plus"></i> Savatga qo'shish</button>
    <div class="reviews-sec"><h3 style="margin-bottom:10px">Sharhlar (${revs.length})</h3>
    ${revs.map(r=>`<div class="review-card"><div class="rev-header"><span class="rev-user">${r.userName||'Foydalanuvchi'}</span><span class="rev-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span></div><div class="rev-text">${r.comment}</div><div class="rev-date">${new Date(r.createdAt).toLocaleDateString()}</div></div>`).join('')}
    <div class="write-rev"><h4 style="margin-bottom:6px">Sharh yozish</h4>
    <div class="star-rating" id="star-r">${[1,2,3,4,5].map(i=>`<i class="fas fa-star${i<=5?' active':''}" data-v="${i}" onclick="setRate(${i})"></i>`).join('')}</div>
    <textarea id="rev-text" placeholder="Fikringizni yozing..."></textarea>
    <button class="btn-primary" style="margin-top:6px" onclick="submitRev('${p.id}')"><i class="fas fa-paper-plane"></i> Yuborish</button></div></div></div>`;
}
function closeModal(){document.getElementById('prod-modal').classList.remove('active');document.getElementById('modal-body').style.display='none'}
function setRate(v){selRating=v;document.querySelectorAll('#star-r i').forEach((s,i)=>s.classList.toggle('active',i<v))}
async function submitRev(pid){
  const c=document.getElementById('rev-text').value.trim();
  if(!c){showToast('Sharh yozing');return}
  await api('addReview',{productId:pid,userId:U.id,userName:U.name,rating:selRating,comment:c});
  showToast('Sharhingiz yuborildi! ✅');closeModal();
  // Refresh products to get updated rating
  loadProds();
}

// ===== CART =====
async function loadCart(){const r=await api('getCart',{userId:U.id});cart=r.success&&r.data?r.data:[];updCartBadge()}
function updCartBadge(){const b=document.getElementById('cart-badge');const t=cart.reduce((s,i)=>s+Number(i.quantity||0),0);b.textContent=t||''}
async function addCart(pid){await api('addToCart',{userId:U.id,productId:pid,quantity:1});showToast("Savatga qo'shildi! 🛒");await loadCart()}
async function updQty(id,q){if(q<1){rmCart(id);return}await api('updateCartItem',{id,quantity:q});loadCart()}
async function rmCart(id){await api('removeFromCart',{id});loadCart();renderCart()}
function renderCart(){
  const el=document.getElementById('cart-content');
  if(!cart.length){el.innerHTML='<div class="empty-state"><i class="fas fa-shopping-cart"></i><h3>Savat bo\'sh</h3><p>Mahsulot qo\'shing</p></div>';return}
  let sub=0;
  let h=cart.map(item=>{
    const p=item.product||{};const it=Number(p.price||0)*Number(item.quantity);sub+=it;
    return `<div class="cart-item"><img class="cart-img" src="${img(p.image)}" onerror="this.src='https://via.placeholder.com/75'">
    <div class="cart-info"><div class="cart-name">${p.name||'Mahsulot'}</div><div class="cart-price">${fp(it)}</div>
    <div class="qty-ctrl"><button class="qty-btn" onclick="updQty('${item.id}',${Number(item.quantity)-1})">−</button><span>${item.quantity}</span><button class="qty-btn" onclick="updQty('${item.id}',${Number(item.quantity)+1})">+</button></div></div>
    <button class="cart-rm" onclick="rmCart('${item.id}')"><i class="fas fa-trash"></i></button></div>`;
  }).join('');
  const del=10000;
  h+=`<div class="cart-summary"><div class="sum-row"><span>Mahsulotlar:</span><span>${fp(sub)}</span></div>
    <div class="sum-row"><span>Yetkazish:</span><span>${fp(del)}</span></div>
    <div class="sum-row total"><span>Jami:</span><span>${fp(sub+del)}</span></div></div>
    <button class="btn-primary" onclick="showPage('checkout')"><i class="fas fa-check-circle"></i> Buyurtma berish</button>`;
  el.innerHTML=h;
}

// ===== CHECKOUT =====
function renderCheckout(){
  let sub=0;cart.forEach(i=>{const p=i.product||{};sub+=Number(p.price||0)*Number(i.quantity)});
  const del=10000;appliedPromo=null;promoDiscount=0;
  document.getElementById('checkout-content').innerHTML=`
    <div class="checkout-sec"><h3><i class="fas fa-truck"></i> Yetkazib berish turi</h3>
    <div class="delivery-opts">
      <div class="del-opt active" onclick="selDel(this,'delivery')"><i class="fas fa-truck"></i>Yetkazib berish</div>
      <div class="del-opt" onclick="selDel(this,'pickup')"><i class="fas fa-store"></i>O'zim olib ketaman</div>
    </div></div>
    <div class="checkout-sec" id="addr-sec"><h3><i class="fas fa-map-marker-alt"></i> Manzil</h3>
    <div class="form-group"><label>Manzil</label><input id="co-addr" value="${U.address||''}" placeholder="Manzilingizni kiriting (kamida 5 belgi)"></div>
    <div class="form-group"><label>Telefon</label><input id="co-phone" value="${U.phone||'+998 '}" placeholder="+998 XX XXX XX XX" oninput="fixPhone(this)"></div></div>
    <div class="checkout-sec"><h3><i class="fas fa-sticky-note"></i> Izoh</h3>
    <div class="form-group"><textarea id="co-note" placeholder="Qo'shimcha izoh..." rows="2"></textarea></div></div>
    <div class="checkout-sec"><h3><i class="fas fa-ticket-alt"></i> Promokod</h3>
    <div class="promo-row"><input id="promo-input" placeholder="Promokod kiriting"><button onclick="applyPromo()">Qo'llash</button></div>
    <div class="promo-msg" id="promo-msg"></div></div>
    <div class="checkout-sec"><h3><i class="fas fa-receipt"></i> Xulosa</h3>
    ${cart.map(i=>{const p=i.product||{};return `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span>${p.name||''} x${i.quantity}</span><span>${fp(Number(p.price||0)*Number(i.quantity))}</span></div>`}).join('')}
    <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px" id="del-row"><span>Yetkazish</span><span>${fp(del)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:var(--accent);display:none" id="disc-row"><span>Chegirma</span><span id="disc-val"></span></div>
    <div class="sum-row total" id="total-row"><span>Jami</span><span id="total-val">${fp(sub+del)}</span></div></div>
    <button class="btn-primary" onclick="placeOrder()"><i class="fas fa-check-circle"></i> Buyurtmani tasdiqlash</button>`;
}
let delType='delivery';
function selDel(el,type){
  delType=type;document.querySelectorAll('.del-opt').forEach(d=>d.classList.remove('active'));el.classList.add('active');
  document.getElementById('addr-sec').style.display=type==='pickup'?'none':'block';
  document.getElementById('del-row').style.display=type==='pickup'?'none':'flex';
  recalcTotal();
}
function recalcTotal(){
  let sub=0;cart.forEach(i=>{const p=i.product||{};sub+=Number(p.price||0)*Number(i.quantity)});
  const del=delType==='pickup'?0:10000;
  const disc=promoDiscount>0?(appliedPromo?.type==='percent'?Math.round(sub*promoDiscount/100):promoDiscount):0;
  const total=sub+del-disc;
  document.getElementById('total-val').textContent=fp(Math.max(0,total));
  if(disc>0){document.getElementById('disc-row').style.display='flex';document.getElementById('disc-val').textContent='-'+fp(disc)}
}
async function applyPromo(){
  const code=document.getElementById('promo-input').value.trim();
  if(!code){showToast('Promokod kiriting');return}
  const r=await api('validatePromo',{code});
  const msg=document.getElementById('promo-msg');
  if(r.success){
    appliedPromo=r.data;promoDiscount=Number(r.data.discount)||0;
    msg.className='promo-msg ok';
    msg.textContent=r.data.type==='percent'?`✅ ${promoDiscount}% chegirma!`:`✅ ${fp(promoDiscount)} chegirma!`;
    recalcTotal();
  }else{msg.className='promo-msg err';msg.textContent='❌ '+(r.error||'Promokod noto\'g\'ri');appliedPromo=null;promoDiscount=0;recalcTotal()}
}
async function placeOrder(){
  const addr=document.getElementById('co-addr')?.value.trim()||'';
  const phone=document.getElementById('co-phone')?.value.trim()||'';
  const note=document.getElementById('co-note')?.value.trim()||'';
  if(delType==='delivery'){
    if(!addr||addr.length<5){showToast('Manzil kamida 5 belgi bo\'lishi kerak');return}
  }
  if(!phone.startsWith('+998')||phone.length<9){showToast('Telefon raqam +998 bilan boshlanishi va kamida 9 raqam bo\'lishi kerak');return}
  let sub=0;
  const items=cart.map(i=>{const p=i.product||{};const t=Number(p.price||0)*Number(i.quantity);sub+=t;return{name:p.name,qty:Number(i.quantity),price:p.price||0,total:t,productId:p.id}});
  const del=delType==='pickup'?0:10000;
  const disc=promoDiscount>0?(appliedPromo?.type==='percent'?Math.round(sub*promoDiscount/100):promoDiscount):0;
  await api('createOrder',{userId:U.id,userName:U.name,items,total:Math.max(0,sub+del-disc),address:addr,phone,note,deliveryType:delType,promoCode:appliedPromo?.code||''});
  showToast('Buyurtma berildi! 🎉');cart=[];updCartBadge();appliedPromo=null;promoDiscount=0;showPage('orders');
}

// ===== ORDERS =====
async function loadOrders(){
  const r=await api('getUserOrders',{userId:U.id});
  const el=document.getElementById('orders-content');
  if(!r.success||!r.data||!r.data.length){el.innerHTML='<div class="empty-state"><i class="fas fa-box-open"></i><h3>Buyurtmalar yo\'q</h3><p>Siz hali buyurtma bermadingiz</p></div>';return}
  const sm={pending:'Kutilmoqda',confirmed:'Tasdiqlandi',shipping:'Yetkazilmoqda',delivered:'Yetkazildi',cancelled:'Bekor qilindi'};
  el.innerHTML=r.data.map(o=>{
    let items=[];try{items=typeof o.items==='string'?JSON.parse(o.items):o.items}catch(e){}
    const itemsHtml=Array.isArray(items)&&items.length?items.map(i=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <div style="flex:1"><div style="font-weight:600">${i.name||'Mahsulot'}</div><div style="color:var(--text2)">${i.qty||i.quantity||1} x ${fp(i.price||0)}</div></div>
      <div style="font-weight:700;color:var(--primary);white-space:nowrap">${fp(i.total||(Number(i.price||0)*Number(i.qty||i.quantity||1)))}</div></div>`).join(''):'<div style="color:var(--text2);font-size:12px">Mahsulotlar ma\'lumoti yo\'q</div>';
    return `<div class="order-card">
      <div class="order-hdr"><span class="order-id">#${(o.id||'').slice(-6)}</span><span class="order-status st-${o.status}">${sm[o.status]||o.status}</span></div>
      <div style="margin:8px 0">${itemsHtml}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;font-size:11px;color:var(--text2)">
        <span><i class="fas fa-truck"></i> ${o.deliveryType==='pickup'?'O\'zim olib ketaman':'Yetkazib berish'}</span>
        ${o.address?'<span><i class="fas fa-map-marker-alt"></i> '+o.address+'</span>':''}
        ${o.phone?'<span><i class="fas fa-phone"></i> '+o.phone+'</span>':''}

// ===== IMAGE RESIZE =====
function resizeImage(file,maxMB){
  maxMB=maxMB||5;
  return new Promise(function(resolve,reject){
    if(file.size>maxMB*1024*1024){reject(new Error('Rasm '+maxMB+'MB dan katta! Kichikroq rasm tanlang.'));return}
    var reader=new FileReader();
    reader.onload=function(e){
      var im=new Image();
      im.onload=function(){
        var c=document.createElement('canvas'),w=im.width,h=im.height,mx=1200;
        if(w>mx||h>mx){if(w>h){h=h*mx/w;w=mx}else{w=w*mx/h;h=mx}}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(im,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',0.7).split(',')[1]);
      };im.onerror=function(){reject(new Error('Rasm yuklanmadi'))};
      im.src=e.target.result;
    };reader.readAsDataURL(file);
  });
}

let supTimer=null;
const WELCOME_MSG='Assalomu alaykum! 👋 Oila Market qo\'llab-quvvatlash xizmatiga xush kelibsiz!\n\nSavollaringiz bo\'lsa, bemalol yozing. Biz sizga yordam berishga tayyormiz! 😊';
async function loadSupport(){
  if(supTimer){clearInterval(supTimer);supTimer=null;}

async function refreshSup(){
  const r=await api('getSupportMessages',{userId:U.id});
  const msgs=r.success&&r.data?r.data:[];
  const box=document.getElementById('chat-msgs');
  const WELCOME_HTML='<div class="chat-msg received"><div class="bubble" style="background:var(--primary);color:#fff;border-radius:16px;border-bottom-left-radius:4px;padding:12px 16px"><span style="white-space:pre-line">'+WELCOME_MSG+'</span></div></div>';
  if(!box){
    document.getElementById('support-content').innerHTML=`
      <div class="chat-box"><div class="chat-msgs" id="chat-msgs">
      ${msgs.length?msgs.map(m=>`<div class="chat-msg ${m.isAdmin===true||m.isAdmin==='true'?'received':'sent'}"><div class="bubble">${m.image?'<img src="'+m.image+'" style="max-width:200px;border-radius:8px;display:block;margin-bottom:4px" onerror="this.style.display=\'none\'">':''}${m.message?'<span>'+m.message+'</span>':''}</div><div class="time">${new Date(m.createdAt).toLocaleString()}</div></div>`).join(''):WELCOME_HTML}
      </div>

        <label style="width:40px;height:40px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--primary);flex-shrink:0"><i class="fas fa-image"></i><input type="file" accept="image/*" style="display:none" onchange="sendSupImg(this)"></label>
        <input id="chat-inp" placeholder="Xabar yozing..." onkeypress="if(event.key==='Enter')sendChat()"><button onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
      </div></div>`;
    const bx=document.getElementById('chat-msgs');if(bx)bx.scrollTop=bx.scrollHeight;
  } else {
    box.innerHTML=msgs.length?msgs.map(m=>`<div class="chat-msg ${m.isAdmin===true||m.isAdmin==='true'?'received':'sent'}"><div class="bubble">${m.image?'<img src="'+m.image+'" style="max-width:200px;border-radius:8px;display:block;margin-bottom:4px" onerror="this.style.display=\'none\'">':''}${m.message?'<span>'+m.message+'</span>':''}</div><div class="time">${new Date(m.createdAt).toLocaleString()}</div></div>`).join(''):WELCOME_HTML;
    box.scrollTop=box.scrollHeight;
  }
}
async function sendChat(){
  const inp=document.getElementById('chat-inp');
  const msg=inp.value.trim();if(!msg)return;
  inp.value='';
  await api('sendSupportMessage',{userId:U.id,userName:U.name,message:msg});
  refreshSup();
}
async function sendSupImg(inp){
  if(!inp.files[0])return;
  try{
    showToast('Rasm kichraytirilmoqda...');
    var b64=await resizeImage(inp.files[0]);
    showToast('Rasm yuklanmoqda...');
    var r=await api('uploadImage',{imageData:b64});
    if(r.success&&r.data){
      await api('sendSupportMessage',{userId:U.id,userName:U.name,message:'📷 Rasm',image:r.data.url});
      showToast('Rasm yuborildi! ✅');
      refreshSup();
    }else showToast('Rasm yuklanmadi');
  }catch(e){showToast(e.message)}
  inp.value='';
}
