<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Panel — Oila Market</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#f8fafc;--card:#fff;--text:#1e293b;--sub:#64748b;
  --border:#e2e8f0;--primary:#2563eb;--primary2:#1d4ed8;
  --danger:#ef4444;--success:#22c55e;--warn:#f59e0b;--input:#f1f5f9;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--sub:#94a3b8;
  --border:#334155;--input:#0f172a;--shadow:0 2px 12px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box;transition:background .2s,color .2s}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
input,textarea,select{background:var(--input);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--primary)}
button{cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:600;padding:10px 18px}
.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-ghost{background:transparent;color:var(--sub);border:1.5px solid var(--border)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;gap:2px;background:none;border:none;color:var(--sub);font-size:10px;cursor:pointer}
.nav-item.active{color:var(--primary)}
.header{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-number{font-size:24px;font-weight:800}
.stat-label{font-size:12px;color:var(--sub);margin-top:2px}
.table-row{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--border)}
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.status-new{background:#dbeafe;color:#1d4ed8}
.status-confirmed{background:#dcfce7;color:#15803d}
.status-processing{background:#fef9c3;color:#a16207}
.status-delivering{background:#ede9fe;color:#7c3aed}
.status-delivered{background:#d1fae5;color:#065f46}
.status-cancelled{background:#fee2e2;color:#b91c1c}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px;transform:translateY(100%);transition:transform .3s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.chat-msg{max-width:75%;padding:10px 14px;border-radius:18px;font-size:13px;margin-bottom:8px}
.chat-msg.admin{align-self:flex-end;background:var(--primary);color:#fff;border-radius:18px 18px 4px 18px;margin-left:auto}
.chat-msg.user{align-self:flex-start;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:18px 18px 18px 4px}
.chat-msg img{max-width:200px;border-radius:8px;display:block;margin-top:6px;cursor:pointer}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="header">
  <div style="font-size:22px">👑</div>
  <h1 style="flex:1;font-size:17px;font-weight:700">Admin Panel</h1>
  <button onclick="toggleTheme()" style="background:none;border:none;font-size:20px;cursor:pointer" id="themeBtn">🌙</button>
</div>

<!-- SECTIONS -->
<div id="dashSection">
  <div style="padding:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px" id="statsGrid">
    <div class="stat-card"><div class="stat-number" id="statOrders">-</div><div class="stat-label">Jami buyurtmalar</div></div>
    <div class="stat-card"><div class="stat-number" id="statToday">-</div><div class="stat-label">Bugungi</div></div>
    <div class="stat-card"><div class="stat-number" id="statNew">-</div><div class="stat-label">Yangi buyurtmalar</div></div>
    <div class="stat-card"><div class="stat-number" id="statUsers">-</div><div class="stat-label">Foydalanuvchilar</div></div>
    <div class="stat-card" style="grid-column:span 2"><div class="stat-number" id="statRevenue">-</div><div class="stat-label">Jami daromad</div></div>
  </div>
</div>

<div id="ordersSection" style="display:none">
  <div style="padding:12px 16px;display:flex;gap:8px;overflow-x:auto">
    <select id="orderStatusFilter" onchange="loadOrders()" style="min-width:140px">
      <option value="">Barcha holat</option>
      <option value="new">Yangi</option>
      <option value="confirmed">Tasdiqlangan</option>
      <option value="processing">Tayyorlanmoqda</option>
      <option value="delivering">Yetkazilmoqda</option>
      <option value="delivered">Yetkazildi</option>
      <option value="cancelled">Bekor qilindi</option>
    </select>
  </div>
  <div id="ordersList" style="padding:0 16px;display:flex;flex-direction:column;gap:10px"></div>
</div>

<div id="productsSection" style="display:none">
  <div style="padding:12px 16px;display:flex;gap:8px">
    <input type="text" placeholder="🔍 Qidirish..." id="productSearch" oninput="filterAdminProducts()" style="flex:1"/>
    <button class="btn-primary" onclick="openProductModal()" style="white-space:nowrap;padding:10px 14px">+ Qo'shish</button>
  </div>
  <div id="adminProductsList" style="padding:0 16px;display:flex;flex-direction:column;gap:8px"></div>
</div>

<div id="supportSection" style="display:none">
  <div style="padding:12px 16px">
    <div style="font-weight:700;margin-bottom:10px">💬 Foydalanuvchilar Murojatlari</div>
    <div id="supportUserList" style="display:flex;flex-direction:column;gap:8px"></div>
  </div>
</div>

<div id="settingsSection" style="display:none">
  <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
    <div class="card">
      <div style="font-weight:700;margin-bottom:14px">🏪 Do'kon Ma'lumotlari</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div><label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">Do'kon nomi</label>
          <input id="settingShopName" placeholder="Do'kon nomi"/></div>
        <div><label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">Telefon</label>
          <input id="settingShopPhone" placeholder="+998 90 123 45 67"/></div>
        <div><label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">Manzil</label>
          <input id="settingShopAddress" placeholder="Manzil"/></div>
        <div><label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">Yetkazib berish narxi (so'm)</label>
          <input id="settingDeliveryFee" type="number" placeholder="15000"/></div>
        <div><label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">Bepul yetkazish (so'mdan)</label>
          <input id="settingFreeDelivery" type="number" placeholder="200000"/></div>
        <button class="btn-primary" onclick="saveSettings()" style="width:100%">💾 Saqlash</button>
      </div>
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:12px">📢 Broadcast (Ommaviy xabar)</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <textarea id="broadcastText" placeholder="Xabar matni..." rows="3" style="resize:none"></textarea>
        <div style="display:flex;gap:8px">
          <label for="broadcastImage" style="flex:1;background:var(--input);border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;font-size:13px;color:var(--sub)">📎 Rasm biriktirish</label>
          <input type="file" id="broadcastImage" accept="image/*" style="display:none" onchange="previewBroadcastImage(this)"/>
        </div>
        <img id="broadcastPreview" style="display:none;border-radius:10px;max-height:150px;object-fit:cover" src="" alt=""/>
        <button class="btn-primary" onclick="sendBroadcast()" style="width:100%">📤 Barcha foydalanuvchilarga yuborish</button>
      </div>
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:12px">⚙️ Sozlamalar</div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
        <span>🌙 Tungi rejim</span>
        <div onclick="toggleTheme()" id="themeSwitchAdmin" style="width:46px;height:26px;border-radius:13px;background:var(--border);cursor:pointer;position:relative">
          <div id="themeKnobAdmin" style="position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,.2)"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" id="anav-dash" onclick="showAdminSection('dash')">📊<span>Bosh</span></button>
  <button class="nav-item" id="anav-orders" onclick="showAdminSection('orders')">📦<span>Buyurtmalar</span></button>
  <button class="nav-item" id="anav-products" onclick="showAdminSection('products')">🛍️<span>Mahsulotlar</span></button>
  <button class="nav-item" id="anav-support" onclick="showAdminSection('support')">💬<span>Xabarlar</span></button>
  <button class="nav-item" id="anav-settings" onclick="showAdminSection('settings')">⚙️<span>Sozlamalar</span></button>
</nav>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="productModalTitle" style="font-size:17px;font-weight:700;margin-bottom:14px">Mahsulot qo'shish</div>
    <input type="hidden" id="editProductId"/>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input id="pName" placeholder="Nomi *"/>
      <input id="pCategory" placeholder="Kategoriya *"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <input id="pPrice" type="number" placeholder="Narx *"/>
        <input id="pOldPrice" type="number" placeholder="Eski narx"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <input id="pStock" type="number" placeholder="Qoldiq"/>
        <input id="pUnit" placeholder="Birlik (kg, dona...)"/>
      </div>
      <textarea id="pDesc" placeholder="Tavsif" rows="2" style="resize:none"></textarea>
      <div style="display:flex;gap:8px">
        <input id="pImage" placeholder="Rasm URL" style="flex:1"/>
        <label for="pImageFile" style="background:var(--input);border:1.5px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;white-space:nowrap;font-size:13px;color:var(--sub)">📷 Yuklash</label>
        <input type="file" id="pImageFile" accept="image/*" style="display:none" onchange="uploadProductImage(this)"/>
      </div>
      <img id="pImagePreview" style="display:none;border-radius:10px;max-height:140px;object-fit:cover" src="" alt=""/>
      <div style="display:flex;gap:10px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="pIsNew"/> Yangi</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="pIsFeatured"/> Mashhur</label>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost" onclick="closeModal('productModal')" style="flex:1">Bekor</button>
        <button class="btn-primary" onclick="saveProduct()" style="flex:2">💾 Saqlash</button>
      </div>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="orderDetailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="orderDetailContent"></div>
  </div>
</div>

<!-- CHAT MODAL -->
<div class="modal-overlay" id="chatModal">
  <div class="modal" style="display:flex;flex-direction:column;max-height:80vh">
    <div class="modal-handle"></div>
    <div id="chatModalTitle" style="font-weight:700;margin-bottom:10px;font-size:15px"></div>
    <div id="adminChatMessages" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;min-height:200px;max-height:350px"></div>
    <div style="display:flex;gap:8px;margin-top:10px;align-items:flex-end">
      <label for="adminChatImage" style="cursor:pointer;color:var(--sub);font-size:20px;padding:8px">📎</label>
      <input type="file" id="adminChatImage" accept="image/*" style="display:none" onchange="sendAdminChatImage(this)"/>
      <textarea id="adminChatInput" placeholder="Javob yozing..." rows="1" style="resize:none;flex:1;border-radius:16px;padding:8px 12px"></textarea>
      <button class="btn-primary" onclick="sendAdminReply()" style="border-radius:50%;width:38px;height:38px;padding:0;display:flex;align-items:center;justify-content:center">➤</button>
    </div>
    <button class="btn-ghost" onclick="closeModal('chatModal')" style="width:100%;margin-top:8px">Yopish</button>
  </div>
</div>

<script>
const ADMIN_CONFIG = {
  SHEET_API_URL: 'https://script.google.com/macros/s/AKfycbyt0sv3i1kM9TFmDaaA04rEk4eIwOr9tSoRLjUMwdXgyVsx6Xb8gnn_15DEU-PoaSdW/exec',
  BOT_TOKEN: '8458201050:AAF4UZOA6Bad9--I8xxVHbxJpjDxg4QeDao',
  IMGBB_API_KEY: 'ad433e82aae872eebbb30c5bfe3fac42',
  ADMIN_IDS: ['858310974'],
  ADMIN_SECRET: 'sherzod_2001',
};

const tg = window.Telegram?.WebApp;
let adminState = {
  orders: [], products: [], users: [], chatUserId: null, chatUserName: '',
  theme: localStorage.getItem('adminTheme') || 'light', settingsLoaded: false
};

// ==================== INIT ====================
async function adminInit() {
  applyTheme(adminState.theme);
  
  if (tg) {
    tg.ready(); tg.expand();
    const u = tg.initDataUnsafe?.user;
    if (u && !ADMIN_CONFIG.ADMIN_IDS.includes(String(u.id))) {
      document.body.innerHTML = '<div style="text-align:center;padding:80px 20px"><div style="font-size:60px">🚫</div><h2 style="margin-top:16px">Ruxsat yo\'q</h2><p style="color:#64748b;margin-top:8px">Admin paneliga kirish huquqingiz yo\'q</p></div>';
      return;
    }
  }

  loadStats();
}

// ==================== THEME ====================
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeBtn');
  const knob = document.getElementById('themeKnobAdmin');
  const sw = document.getElementById('themeSwitchAdmin');
  if (theme === 'dark') {
    if (btn) btn.textContent = '☀️';
    if (knob) knob.style.left = '23px';
    if (sw) sw.style.background = 'var(--primary)';
  } else {
    if (btn) btn.textContent = '🌙';
    if (knob) knob.style.left = '3px';
    if (sw) sw.style.background = 'var(--border)';
  }
}

function toggleTheme() {
  adminState.theme = adminState.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('adminTheme', adminState.theme);
  applyTheme(adminState.theme);
}

// ==================== API ====================
async function adminApi(data) {
  try {
    const res = await fetch(ADMIN_CONFIG.SHEET_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ ...data, adminSecret: ADMIN_CONFIG.ADMIN_SECRET }),
      redirect: 'follow'
    });
    return await res.json();
  } catch (e) { return { success: false, error: e.message }; }
}

// ==================== STATS ====================
async function loadStats() {
  const res = await adminApi({ action: 'getStats' });
  if (res.success) {
    const d = res.data;
    document.getElementById('statOrders').textContent = d.totalOrders;
    document.getElementById('statToday').textContent = d.todayOrders;
    document.getElementById('statNew').textContent = d.newOrders;
    document.getElementById('statUsers').textContent = d.totalUsers;
    document.getElementById('statRevenue').textContent = Number(d.totalRevenue).toLocaleString() + " so'm";
  }
}

// ==================== ORDERS ====================
async function loadOrders() {
  const filter = document.getElementById('orderStatusFilter').value;
  const res = await adminApi({ action: 'getOrders' });
  if (res.success) {
    adminState.orders = res.data;
    const filtered = filter ? res.data.filter(o => o.status === filter) : res.data;
    renderOrders(filtered);
  }
}

function renderOrders(orders) {
  const container = document.getElementById('ordersList');
  if (!orders.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--sub)">📦 Buyurtmalar yo\'q</div>';
    return;
  }
  container.innerHTML = orders.map(o => `
    <div class="card" onclick="openOrderDetail('${o.id}')" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-weight:700;font-size:14px">${o.id}</div>
        <span class="status-badge status-${o.status}">${statusLabel(o.status)}</span>
      </div>
      <div style="font-size:13px;color:var(--sub)">${o.userName || ''} · 📞 ${o.phone || 'Yo\'q'}</div>
      <div style="font-size:13px;color:var(--sub);margin-top:2px">${o.address || ''}</div>
      <div style="font-weight:700;color:var(--primary);margin-top:6px">${Number(o.total||0).toLocaleString()} so'm</div>
    </div>
  `).join('');
}

function openOrderDetail(orderId) {
  const o = adminState.orders.find(x => x.id === orderId);
  if (!o) return;
  const mapLink = o.lat && o.lng ? `<a href="https://maps.google.com/?q=${o.lat},${o.lng}" target="_blank" style="color:var(--primary)">🗺️ Xaritada ko'rish</a>` : '';
  document.getElementById('orderDetailContent').innerHTML = `
    <div style="font-size:17px;font-weight:700;margin-bottom:14px">📦 ${o.id}</div>
    <div style="display:flex;flex-direction:column;gap:8px;font-size:14px;margin-bottom:14px">
      <div><b>Mijoz:</b> ${o.userName || ''}</div>
      <div><b>📞 Tel:</b> ${o.phone || 'Yo\'q'}</div>
      <div><b>📍 Manzil:</b> ${o.address || ''} ${mapLink}</div>
      <div><b>💰 Jami:</b> ${Number(o.total||0).toLocaleString()} so'm</div>
      <div><b>⏰ Sana:</b> ${o.date || ''}</div>
      ${o.note ? '<div><b>📝 Izoh:</b> ' + o.note + '</div>' : ''}
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:var(--sub);display:block;margin-bottom:6px">Holat o'zgartirish</label>
      <select id="statusSelect" style="width:100%;margin-bottom:8px">
        ${['new','confirmed','processing','delivering','delivered','cancelled'].map(s => `<option value="${s}" ${o.status===s?'selected':''}>${statusLabel(s)}</option>`).join('')}
      </select>
      <textarea id="adminNoteInput" placeholder="Admin izohi..." rows="2" style="resize:none">${o.adminNote||''}</textarea>
      <button class="btn-primary" onclick="updateStatus('${o.id}')" style="width:100%;margin-top:8px">✅ Yangilash</button>
    </div>
    <button class="btn-ghost" onclick="closeModal('orderDetailModal')" style="width:100%">Yopish</button>
  `;
  document.getElementById('orderDetailModal').classList.add('open');
}

async function updateStatus(orderId) {
  const status = document.getElementById('statusSelect').value;
  const note = document.getElementById('adminNoteInput').value;
  const res = await adminApi({ action: 'updateOrderStatus', orderId, status, adminNote: note });
  if (res.success) {
    showToast('✅ Holat yangilandi!');
    closeModal('orderDetailModal');
    loadOrders();
  } else showToast('❌ Xatolik');
}

// ==================== PRODUCTS ====================
async function loadProducts() {
  const res = await adminApi({ action: 'getProducts' });
  if (res.success) {
    adminState.products = res.data;
    renderAdminProducts(res.data);
  }
}

function renderAdminProducts(products) {
  const container = document.getElementById('adminProductsList');
  container.innerHTML = products.map(p => `
    <div class="card" style="display:flex;align-items:center;gap:12px">
      <img src="${p.image||''}" style="width:50px;height:50px;border-radius:10px;object-fit:cover;background:var(--input)" onerror="this.src=''"/>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>
        <div style="color:var(--primary);font-weight:700;font-size:13px">${Number(p.price||0).toLocaleString()} so'm</div>
        <div style="color:var(--sub);font-size:11px">${p.category||''} · Qoldiq: ${p.stock||0}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="openProductModal('${p.id}')" style="padding:8px 12px;background:var(--input);border:1px solid var(--border);border-radius:8px;font-size:12px">✏️</button>
        <button onclick="deleteProduct('${p.id}')" style="padding:8px 12px;background:#fee2e2;border:1px solid #fecaca;border-radius:8px;font-size:12px;color:#b91c1c">🗑️</button>
      </div>
    </div>
  `).join('');
}

function filterAdminProducts() {
  const q = document.getElementById('productSearch').value.toLowerCase();
  renderAdminProducts(adminState.products.filter(p => p.name?.toLowerCase().includes(q) || p.category?.toLowerCase().includes(q)));
}

function openProductModal(productId) {
  const modal = document.getElementById('productModal');
  const p = productId ? adminState.products.find(x => x.id === productId) : null;
  document.getElementById('productModalTitle').textContent = p ? 'Mahsulotni tahrirlash' : 'Yangi mahsulot';
  document.getElementById('editProductId').value = p?.id || '';
  document.getElementById('pName').value = p?.name || '';
  document.getElementById('pCategory').value = p?.category || '';
  document.getElementById('pPrice').value = p?.price || '';
  document.getElementById('pOldPrice').value = p?.oldPrice || '';
  document.getElementById('pStock').value = p?.stock || '';
  document.getElementById('pUnit').value = p?.unit || 'dona';
  document.getElementById('pDesc').value = p?.description || '';
  document.getElementById('pImage').value = p?.image || '';
  document.getElementById('pIsNew').checked = p?.isNew === 'TRUE' || p?.isNew === true;
  document.getElementById('pIsFeatured').checked = p?.isFeatured === 'TRUE' || p?.isFeatured === true;
  const prev = document.getElementById('pImagePreview');
  if (p?.image) { prev.src = p.image; prev.style.display = 'block'; } else prev.style.display = 'none';
  modal.classList.add('open');
}

async function uploadProductImage(input) {
  const file = input.files[0];
  if (!file) return;
  showToast('⏳ Rasm yuklanmoqda...');
  const form = new FormData();
  form.append('image', file);
  const r = await fetch('https://api.imgbb.com/1/upload?key=' + ADMIN_CONFIG.IMGBB_API_KEY, { method: 'POST', body: form });
  const d = await r.json();
  if (d.success) {
    document.getElementById('pImage').value = d.data.url;
    const prev = document.getElementById('pImagePreview');
    prev.src = d.data.url; prev.style.display = 'block';
    showToast('✅ Rasm yuklandi!');
  }
}

async function saveProduct() {
  const id = document.getElementById('editProductId').value;
  const data = {
    action: id ? 'updateProduct' : 'addProduct',
    id, name: document.getElementById('pName').value,
    category: document.getElementById('pCategory').value,
    price: document.getElementById('pPrice').value,
    oldPrice: document.getElementById('pOldPrice').value || 0,
    stock: document.getElementById('pStock').value || 0,
    unit: document.getElementById('pUnit').value || 'dona',
    description: document.getElementById('pDesc').value,
    image: document.getElementById('pImage').value,
    isNew: document.getElementById('pIsNew').checked ? 'TRUE' : 'FALSE',
    isFeatured: document.getElementById('pIsFeatured').checked ? 'TRUE' : 'FALSE',
    status: 'active'
  };
  if (!data.name || !data.price) { showToast('Nomi va narxini kiriting!'); return; }
  const res = await adminApi(data);
  if (res.success) {
    showToast('✅ Saqlandi!');
    closeModal('productModal');
    loadProducts();
  } else showToast('❌ Xatolik: ' + res.error);
}

async function deleteProduct(id) {
  if (!confirm('Mahsulotni o\'chirish?')) return;
  const res = await adminApi({ action: 'deleteProduct', id });
  if (res.success) { showToast('✅ O\'chirildi!'); loadProducts(); }
}

// ==================== SETTINGS ====================
async function loadSettings() {
  if (adminState.settingsLoaded) return;
  const res = await adminApi({ action: 'getSettings' });
  if (res.success && res.data) {
    const d = res.data;
    document.getElementById('settingShopName').value = d.shopName || '';
    document.getElementById('settingShopPhone').value = d.shopPhone || '';
    document.getElementById('settingShopAddress').value = d.shopAddress || '';
    document.getElementById('settingDeliveryFee').value = d.deliveryFee || '';
    document.getElementById('settingFreeDelivery').value = d.freeDeliveryFrom || '';
    adminState.settingsLoaded = true;
  }
}

async function saveSettings() {
  const data = {
    action: 'saveSettings',
    shopName: document.getElementById('settingShopName').value,
    shopPhone: document.getElementById('settingShopPhone').value,
    shopAddress: document.getElementById('settingShopAddress').value,
    deliveryFee: document.getElementById('settingDeliveryFee').value,
    freeDeliveryFrom: document.getElementById('settingFreeDelivery').value,
  };
  const res = await adminApi(data);
  if (res.success) {
    showToast('✅ Sozlamalar saqlandi!');
    // Cache ni yangilash
    adminState.settingsLoaded = false;
  } else showToast('❌ Xatolik: ' + (res.error || ''));
}

// ==================== BROADCAST ====================
let broadcastImageUrl = '';
function previewBroadcastImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const prev = document.getElementById('broadcastPreview');
    prev.src = e.target.result; prev.style.display = 'block';
    // ImgBB ga yuklash
    const form = new FormData(); form.append('image', file);
    const r = await fetch('https://api.imgbb.com/1/upload?key=' + ADMIN_CONFIG.IMGBB_API_KEY, { method: 'POST', body: form });
    const d = await r.json();
    if (d.success) broadcastImageUrl = d.data.url;
  };
  reader.readAsDataURL(file);
}

async function sendBroadcast() {
  const text = document.getElementById('broadcastText').value.trim();
  if (!text && !broadcastImageUrl) { showToast('Xabar yoki rasm kiriting!'); return; }
  if (!confirm('Barcha foydalanuvchilarga xabar yuborilsinmi?')) return;
  showToast('⏳ Yuborilmoqda...');
  const res = await adminApi({ action: 'sendBroadcast', text, image: broadcastImageUrl });
  if (res.success) {
    showToast(`✅ Yuborildi: ${res.sent} ta`);
    document.getElementById('broadcastText').value = '';
    document.getElementById('broadcastPreview').style.display = 'none';
    broadcastImageUrl = '';
  } else showToast('❌ Xatolik');
}

// ==================== SUPPORT CHAT ====================
async function loadSupportUsers() {
  const res = await adminApi({ action: 'getUsers' });
  if (res.success) {
    adminState.users = res.data;
    renderSupportUsers(res.data);
  }
}

function renderSupportUsers(users) {
  const container = document.getElementById('supportUserList');
  if (!users.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--sub)">Foydalanuvchilar yo\'q</div>';
    return;
  }
  container.innerHTML = users.map(u => `
    <div class="card" style="display:flex;align-items:center;gap:12px;cursor:pointer" onclick="openChat('${u.userId}','${u.name}')">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0">👤</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px">${u.name||'Noma\'lum'}</div>
        <div style="color:var(--sub);font-size:12px">${u.phone||''} ${u.username ? '· @'+u.username : ''}</div>
      </div>
      <span style="color:var(--primary);font-size:13px">💬</span>
    </div>
  `).join('');
}

async function openChat(userId, userName) {
  adminState.chatUserId = userId;
  adminState.chatUserName = userName;
  document.getElementById('chatModalTitle').textContent = '💬 ' + userName;
  document.getElementById('adminChatMessages').innerHTML = '<div style="text-align:center;color:var(--sub);padding:20px">Yuklanmoqda...</div>';
  document.getElementById('chatModal').classList.add('open');
  
  const res = await adminApi({ action: 'getChatMessages', userId });
  if (res.success) renderAdminChat(res.data || []);
}

function renderAdminChat(msgs) {
  const container = document.getElementById('adminChatMessages');
  if (!msgs.length) { container.innerHTML = '<div style="text-align:center;color:var(--sub);padding:20px">Xabarlar yo\'q</div>'; return; }
  container.innerHTML = msgs.map(m => `
    <div class="chat-msg ${m.sender === 'admin' ? 'admin' : 'user'}">
      ${m.text ? `<span>${m.text}</span>` : ''}
      ${m.image ? `<img src="${m.image}" onclick="window.open(this.src)"/>` : ''}
      <div style="font-size:10px;opacity:.6;margin-top:4px">${m.time||''}</div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendAdminReply() {
  const text = document.getElementById('adminChatInput').value.trim();
  if (!text || !adminState.chatUserId) return;
  document.getElementById('adminChatInput').value = '';
  const res = await adminApi({ action: 'adminReply', userId: adminState.chatUserId, text });
  if (res.success) openChat(adminState.chatUserId, adminState.chatUserName);
  else showToast('❌ Xatolik');
}

async function sendAdminChatImage(input) {
  const file = input.files[0]; if (!file) return;
  showToast('⏳ Rasm yuklanmoqda...');
  const form = new FormData(); form.append('image', file);
  const r = await fetch('https://api.imgbb.com/1/upload?key=' + ADMIN_CONFIG.IMGBB_API_KEY, { method: 'POST', body: form });
  const d = await r.json();
  if (d.success) {
    const res = await adminApi({ action: 'adminReply', userId: adminState.chatUserId, image: d.data.url, text: '' });
    if (res.success) openChat(adminState.chatUserId, adminState.chatUserName);
  }
}

// ==================== NAVIGATION ====================
function showAdminSection(name) {
  ['dash','orders','products','support','settings'].forEach(s => {
    document.getElementById(s + 'Section').style.display = 'none';
    const nav = document.getElementById('anav-' + s);
    if (nav) nav.classList.remove('active');
  });
  document.getElementById(name + 'Section').style.display = 'block';
  document.getElementById('anav-' + name).classList.add('active');
  
  if (name === 'dash') loadStats();
  if (name === 'orders') loadOrders();
  if (name === 'products') loadProducts();
  if (name === 'support') loadSupportUsers();
  if (name === 'settings') loadSettings();
}

// ==================== HELPERS ====================
function statusLabel(s) {
  return { new:'Yangi', confirmed:'Tasdiqlangan', processing:'Tayyorlanmoqda', delivering:'Yetkazilmoqda', delivered:'Yetkazildi', cancelled:'Bekor qilindi' }[s] || s;
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

adminInit();
</script>
